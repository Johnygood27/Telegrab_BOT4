<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Encrypted Adder</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 420px;
      margin: 40px auto;
      text-align: center;
    }
    input,
    button {
      margin: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 1rem;
    }
    button {
      background-color: #4caf50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      min-height: 1.4rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Encrypted Adder 🔢</h1>
  <div id="status"></div>
  <input id="a" type="number" placeholder="A" />
  <input id="b" type="number" placeholder="B" />
  <button id="computeBtn" onclick="encryptAndCompute()">Compute Sum 🧮</button>
  <p id="result"></p>
  <script type="module">
    import { initSDK, createInstance, SepoliaConfig } from 'https://cdn.jsdelivr.net/npm/@zama-fhe/relayer-sdk@0.1.2/+esm';
    import { ethers } from 'https://cdn.jsdelivr.net/npm/ethers@6.15.0/+esm';

    const SERVER_URL = 'http://localhost:3001';
    const RELAYER_URI = '<your_relayer_url>';
    const CONTRACT_ADDRESS = '<your_contract_address>';

    let instance;
    (async () => {
      await initSDK();
      instance = await createInstance({ ...SepoliaConfig, relayerUrl: RELAYER_URI });
    })();

    function toHex(bytes) {
      return Array.from(bytes)
        .map((x) => x.toString(16).padStart(2, '0'))
        .join('');
    }

    async function encryptAndCompute() {
      const btn = document.getElementById('computeBtn');
      const status = document.getElementById('status');
      const a = document.getElementById('a').value;
      const b = document.getElementById('b').value;

      btn.disabled = true;
      status.textContent = '🔐 Encrypting...';

      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send('eth_requestAccounts', []);
      const signer = await provider.getSigner();
      const userAddress = await signer.getAddress();

      let resp = await fetch(`${SERVER_URL}/encrypt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ a, b, userAddress })
      });
      const { handleA, handleB, proof } = await resp.json();

      status.textContent = '⚙️ Computing...';

      resp = await fetch(`${SERVER_URL}/compute`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ handleA, handleB, proof })
      });
      const { sumHandle } = await resp.json();

      status.textContent = '🔓 Decrypting...';

      const keypair = instance.generateKeypair();
      const startTs = Math.floor(Date.now() / 1000);
      const durationDays = 365;
      const eip712 = instance.createEIP712(keypair.publicKey, [CONTRACT_ADDRESS], startTs, durationDays);
      const signature = await signer.signTypedData(eip712.domain, eip712.types, eip712.message);

      resp = await fetch(`${SERVER_URL}/decrypt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sumHandle,
          userAddress,
          publicKey: toHex(keypair.publicKey),
          privateKey: toHex(keypair.privateKey),
          signature,
          startTs,
          durationDays
        })
      });
      const { plaintext } = await resp.json();

      status.textContent = '';
      document.getElementById('result').textContent = '✅ Sum: ' + plaintext;
      btn.disabled = false;
    }

    window.encryptAndCompute = encryptAndCompute;
  </script>
</body>
</html>
